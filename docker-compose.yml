services:
  # 1. MongoDB Database
  mongo-db:
    image: mongo:latest
    container_name: mern-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

  # 2. Redis Cache
  redis-cache:
    image: redis:alpine
    container_name: mern-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mern-network

  # 3. Node.js Backend API
  backend:
    build: ./backend
    container_name: mern-backend
    ports:
      - "5000:5000"
      - "9229:9229" # 👈 Maps the VS Code debugging port
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    # 👇 Tells nodemon to launch node with the inspection flag
    command: npx nodemon --exec "node --inspect=0.0.0.0:9229" index.js
    depends_on:
      - mongo-db
      - redis-cache
    networks:
      - mern-network

  # 4. React Frontend
  frontend:
    build: ./frontend
    container_name: mern-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true 
    tty: true
    depends_on:
      - backend
    networks:
      - mern-network

volumes:
  mongo-data:
  redis-data:

networks:
  mern-network:
    driver: bridge
